type User @table {
  displayName: String!
  email: String!
  createdAt: String!
  updatedAt: String
  avatarUrl: String
  bio: String
  culturalBackground: String
  isVerified: Boolean
  culturePassId: String
}

type Community @table {
  name: String!
  description: String!
  createdAt: String!
  updatedAt: String
  avatarUrl: String
  culturalFocus: String
  isVerified: Boolean
  membersCount: Int
  culturePassId: String
}

type Event @table {
  title: String!
  description: String!
  eventDate: String!
  location: String!
  createdAt: String!
  updatedAt: String
  community: Community
  avatarUrl: String
  startTime: String
  endTime: String
  isVerified: Boolean
  culturePassId: String
  organizerId: String
}

type Business @table {
  name: String!
  category: String!
  description: String!
  address: String!
  createdAt: String!
  updatedAt: String
  avatarUrl: String
  website: String
  phoneNumber: String
  culturalSpecialty: String
  isVerified: Boolean
  culturePassId: String
  ownerId: String
}

type CommunityMembership @table(key: ["userId", "communityId"]) {
  userId: String!
  communityId: String!
  joinedAt: String!
}